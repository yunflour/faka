<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .notice {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            color: #666;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-btn:hover:not(.active) {
            background: #e0e0e0;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .result h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .account-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .account-info .field {
            margin-bottom: 10px;
        }
        .account-info .field-label {
            font-weight: 500;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .account-info .field-value {
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            border: 1px solid #e0e0e0;
            max-height: 100px;
            overflow-y: auto;
        }
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .copy-btn:hover {
            background: #5a6fd6;
        }
        .warranty-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .warranty-info.valid {
            background: #d4edda;
            border-color: #28a745;
        }
        .warranty-info.expired {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-badge.available {
            background: #d4edda;
            color: #155724;
        }
        .status-badge.blocked {
            background: #f8d7da;
            color: #721c24;
        }
        .status-badge.unknown {
            background: #eceff1;
            color: #455a64;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 30px;
            font-size: 14px;
        }
        /* 批量输入框样式 */
        .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .input-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-group .btn {
            flex: 1;
        }
        /* 批量结果样式 */
        .batch-result {
            margin-top: 20px;
        }
        .batch-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .batch-summary-item {
            text-align: center;
        }
        .batch-summary-item .count {
            font-size: 24px;
            font-weight: 700;
        }
        .batch-summary-item .label {
            font-size: 12px;
            color: #666;
        }
        .batch-summary-item.success .count {
            color: #28a745;
        }
        .batch-summary-item.failed .count {
            color: #dc3545;
        }
        .batch-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .batch-item.failed {
            border-left-color: #dc3545;
            background: #fff5f5;
        }
        .batch-item.success {
            border-left-color: #28a745;
        }
        .batch-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .batch-item-cdk {
            font-family: monospace;
            font-weight: 600;
        }
        .batch-item-status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .batch-item-status.success {
            background: #d4edda;
            color: #155724;
        }
        .batch-item-status.failed {
            background: #f8d7da;
            color: #721c24;
        }
        .batch-item-content {
            font-size: 13px;
            color: #666;
        }
        .batch-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .batch-actions .btn {
            flex: none;
            width: auto;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>{{ site_title }}</h1>
            </div>

            {% if site_notice %}
            <div class="notice">
                {{ site_notice }}
            </div>
            {% endif %}

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('redeem')">CDK提卡</button>
                <button class="tab-btn" onclick="switchTab('warranty')">质保查询</button>
            </div>

            <!-- CDK提卡 -->
            <div id="tab-redeem" class="tab-content active">
                <div class="tabs" style="margin-bottom: 15px;">
                    <button class="tab-btn active" style="font-size: 14px; padding: 10px;" onclick="switchRedeemMode('single')">单个提卡</button>
                    <button class="tab-btn" style="font-size: 14px; padding: 10px;" onclick="switchRedeemMode('batch')">批量提卡</button>
                </div>

                <!-- 单个提卡 -->
                <div id="redeem-single">
                    <div class="input-group">
                        <label for="cdk-input">请输入CDK码</label>
                        <input type="text" id="cdk-input" placeholder="例如: KIRO-XXXXXXXX">
                    </div>
                    <button class="btn btn-primary" onclick="redeemCDK()">立即提卡</button>
                </div>

                <!-- 批量提卡 -->
                <div id="redeem-batch" style="display: none;">
                    <div class="input-group">
                        <label for="cdk-batch-input">请输入多个CDK码（每行一个）</label>
                        <textarea id="cdk-batch-input" placeholder="KIRO-XXXXXXXXX&#10;KIRO-YYYYYYYYY&#10;KIRO-ZZZZZZZZZ"></textarea>
                        <div class="input-hint">支持换行、逗号或分号分隔，单次最多100个</div>
                    </div>
                    <button class="btn btn-primary" onclick="redeemCDKBatch()">批量提卡</button>
                </div>

                <div class="loading" id="redeem-loading">
                    <div class="spinner"></div>
                    <p>正在处理中...</p>
                </div>

                <div id="redeem-result" class="result"></div>
            </div>

            <!-- 质保查询 -->
            <div id="tab-warranty" class="tab-content">
                <div class="tabs" style="margin-bottom: 15px;">
                    <button class="tab-btn active" style="font-size: 14px; padding: 10px;" onclick="switchWarrantyMode('single')">单个查询</button>
                    <button class="tab-btn" style="font-size: 14px; padding: 10px;" onclick="switchWarrantyMode('batch')">批量查询</button>
                </div>

                <!-- 单个查询 -->
                <div id="warranty-single">
                    <div class="input-group">
                        <label for="warranty-cdk-input">请输入CDK码查询质保状态</label>
                        <input type="text" id="warranty-cdk-input" placeholder="例如: KIRO-XXXXXXXX">
                    </div>
                    <button class="btn btn-primary" onclick="checkWarranty()">查询质保</button>
                </div>

                <!-- 批量查询 -->
                <div id="warranty-batch" style="display: none;">
                    <div class="input-group">
                        <label for="warranty-batch-input">请输入多个CDK码查询质保状态</label>
                        <textarea id="warranty-batch-input" placeholder="KIRO-XXXXXXXXX&#10;KIRO-YYYYYYYYY&#10;KIRO-ZZZZZZZZZ"></textarea>
                        <div class="input-hint">支持换行、逗号或分号分隔，单次最多100个</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="checkWarrantyBatch()">批量查询</button>
                        <button class="btn btn-danger" onclick="replaceWarrantyBatch()">批量替换</button>
                    </div>
                </div>

                <div class="loading" id="warranty-loading">
                    <div class="spinner"></div>
                    <p>正在查询中...</p>
                </div>

                <div id="warranty-result" class="result"></div>
            </div>
        </div>

        <div class="footer">
            <p>Kiro 发卡平台 &copy; 2026 by yunflour</p>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        function switchRedeemMode(mode) {
            const buttons = document.querySelectorAll('#tab-redeem .tabs .tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('redeem-single').style.display = mode === 'single' ? 'block' : 'none';
            document.getElementById('redeem-batch').style.display = mode === 'batch' ? 'block' : 'none';
            document.getElementById('redeem-result').style.display = '';
        }

        function switchWarrantyMode(mode) {
            const buttons = document.querySelectorAll('#tab-warranty .tabs .tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('warranty-single').style.display = mode === 'single' ? 'block' : 'none';
            document.getElementById('warranty-batch').style.display = mode === 'batch' ? 'block' : 'none';
            document.getElementById('warranty-result').style.display = '';
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = originalText, 2000);
            });
        }

        function downloadOrderJson(orderId, format) {
            if (format === 'kiro') {
                window.open(`/api/order/${orderId}/download/kiro`, '_blank');
            } else {
                window.open(`/api/order/${orderId}/download`, '_blank');
            }
        }

async function redeemCDK() {
            const cdk = document.getElementById('cdk-input').value.trim();
            if (!cdk) {
                alert('请输入CDK码');
                return;
            }

            const loading = document.getElementById('redeem-loading');
            const result = document.getElementById('redeem-result');
            loading.classList.add('show');
            result.style.display = '';

            try {
                const response = await fetch('/api/redeem', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cdk: cdk})
                });
                const data = await response.json();

                loading.classList.remove('show');

                if (data.success) {
                    if (data.already_used) {
                        result.className = 'result success';
                        result.innerHTML = `
                            <h3>CDK已使用</h3>
                            <p>此CDK已于之前使用，订单号: ${data.order_id}</p>
                            <button class="btn btn-primary" style="margin-top:15px" onclick="viewOrder(${data.order_id})">查看订单详情</button>
                            <select class="btn btn-success" style="margin-top:10px; color: #fff; background-color: #28a745;" onchange="downloadOrderJson(${data.order_id}, this.value)">
                                <option value="">下载JSON</option>
                                <option value="cpa">CPA格式</option>
                                <option value="kiro">Kiro Account Manager</option>
                            </select>
                        `;
                    } else {
                        const acc = data.account;
                        result.className = 'result success';
                        result.innerHTML = `
                            <h3>提卡成功</h3>
                            <p>订单号: ${data.order_id}</p>
                            <p>质保期限: ${data.warranty.days}天 (至 ${new Date(data.warranty.expires_at).toLocaleString()})</p>
                            <div class="account-info">
                                <div class="field">
                                    <div class="field-label">邮箱</div>
                                    <div class="field-value">${acc.email}<button class="copy-btn" onclick="copyToClipboard('${acc.email}', this)">复制</button></div>
                                </div>
                                ${acc.access_token ? `
                                <div class="field">
                                    <div class="field-label">Access Token</div>
                                    <div class="field-value">${acc.access_token}<button class="copy-btn" onclick="copyToClipboard('${acc.access_token}', this)">复制</button></div>
                                </div>
                                ` : ''}
                                ${acc.refresh_token ? `
                                <div class="field">
                                    <div class="field-label">Refresh Token</div>
                                    <div class="field-value">${acc.refresh_token}<button class="copy-btn" onclick="copyToClipboard('${acc.refresh_token}', this)">复制</button></div>
                                </div>
                                ` : ''}
                                ${acc.id_token ? `
                                <div class="field">
                                    <div class="field-label">ID Token</div>
                                    <div class="field-value">${acc.id_token}<button class="copy-btn" onclick="copyToClipboard('${acc.id_token}', this)">复制</button></div>
                                </div>
                                ` : ''}
                            </div>
                            <button class="btn btn-success" style="margin-top:15px" onclick="copyAllTokens(${JSON.stringify(acc).replace(/"/g, '&quot;')})">复制全部信息</button>
                            <select class="btn btn-success" style="margin-top:10px; color: #fff; background-color: #28a745;" onchange="downloadOrderJson(${data.order_id}, this.value)">
                                <option value="">下载JSON</option>
                                <option value="cpa">CPA格式</option>
                                <option value="kiro">Kiro Account Manager</option>
                            </select>
                        `;
                    }
                } else {
                    result.className = 'result error';
                    result.innerHTML = `<h3>提卡失败</h3><p>${data.error}</p>`;
                }
            } catch (error) {
                loading.classList.remove('show');
                result.className = 'result error';
                result.innerHTML = `<h3>请求失败</h3><p>${error.message}</p>`;
            }
        }

        async function viewOrder(orderId) {
            try {
                const response = await fetch('/api/order/' + orderId);
                const data = await response.json();

                if (data.success) {
                    const order = data.order;
                    const acc = data.account;
                    const result = document.getElementById('redeem-result');

                    result.innerHTML = `
                        <h3>订单详情 #${order.id}</h3>
                        <p>CDK: ${order.cdk_code}</p>
                        <p>状态: ${order.status}</p>
                        <p>质保期限: ${order.warranty_days}天 (至 ${new Date(order.warranty_expires_at).toLocaleString()})</p>
                        <p>替换次数: ${order.replacement_count}</p>
                        ${acc ? `
                        <div class="account-info">
                            <div class="field">
                                <div class="field-label">邮箱</div>
                                <div class="field-value">${acc.email}<button class="copy-btn" onclick="copyToClipboard('${acc.email}', this)">复制</button></div>
                            </div>
                            ${acc.access_token ? `
                            <div class="field">
                                <div class="field-label">Access Token</div>
                                <div class="field-value">${acc.access_token}<button class="copy-btn" onclick="copyToClipboard('${acc.access_token}', this)">复制</button></div>
                            </div>
                            ` : ''}
                            ${acc.refresh_token ? `
                            <div class="field">
                                <div class="field-label">Refresh Token</div>
                                <div class="field-value">${acc.refresh_token}<button class="copy-btn" onclick="copyToClipboard('${acc.refresh_token}', this)">复制</button></div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                        <select class="btn btn-success" style="margin-top:15px; color: #fff; background-color: #28a745;" onchange="downloadOrderJson(${order.id}, this.value)">
                                <option value="">下载JSON</option>
                                <option value="cpa">CPA格式</option>
                                <option value="kiro">Kiro Account Manager</option>
                            </select>
                    `;
                }
            } catch (error) {
                alert('获取订单详情失败: ' + error.message);
            }
        }

        function copyAllTokens(acc) {
            const text = `邮箱: ${acc.email}\nAccess Token: ${acc.access_token || ''}\nRefresh Token: ${acc.refresh_token || ''}\nID Token: ${acc.id_token || ''}`;
            navigator.clipboard.writeText(text).then(() => alert('已复制全部信息'));
        }

        async function checkWarranty() {
            const cdk = document.getElementById('warranty-cdk-input').value.trim();
            if (!cdk) {
                alert('请输入CDK码');
                return;
            }

            const loading = document.getElementById('warranty-loading');
            const result = document.getElementById('warranty-result');
            loading.classList.add('show');
            result.style.display = '';

            try {
                const response = await fetch('/api/warranty/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cdk: cdk})
                });
                const data = await response.json();

                loading.classList.remove('show');

                if (data.success) {
                    const order = data.order;
                    const account = data.account;
                    const warranty = data.warranty;

                    let warrantyClass = warranty.in_warranty ? 'valid' : 'expired';
                    const accountClass = account.classification || (account.is_valid ? 'available' : 'unknown');
                    const statusClass = accountClass === 'blocked' ? 'blocked' : (accountClass === 'available' ? 'available' : 'unknown');
                    const statusText = accountClass === 'blocked' ? '已封禁' : (accountClass === 'available' ? '正常' : '未知');

                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>质保查询结果</h3>
                        <div class="warranty-info ${warrantyClass}">
                            <p><strong>订单号:</strong> ${order.id}</p>
                            <p><strong>CDK:</strong> ${order.cdk_code}</p>
                            <p><strong>质保到期:</strong> ${new Date(order.warranty_expires_at).toLocaleString()}</p>
                            <p><strong>质保状态:</strong> ${warranty.in_warranty ? '质保中' : '已过期'}</p>
                            <p><strong>替换次数:</strong> ${order.replacement_count} / ${order.max_replacements}</p>
                        </div>
                        <div class="account-info" style="margin-top:15px">
                            <p><strong>账号邮箱:</strong> ${account.email}</p>
                            <p><strong>账号状态:</strong> <span class="status-badge ${statusClass}">${statusText}</span></p>
                        </div>
                        ${warranty.can_replace ? `
                        <button class="btn btn-danger" style="margin-top:15px" onclick="requestReplacement('${order.cdk_code}')">申请替换账号</button>
                        <p style="margin-top:10px;color:#666;font-size:14px">${warranty.reason}</p>
                        ` : `<p style="margin-top:15px;color:#666">${warranty.reason}</p>`}
                    `;
                } else {
                    result.className = 'result error';
                    result.innerHTML = `<h3>查询失败</h3><p>${data.error}</p>`;
                }
            } catch (error) {
                loading.classList.remove('show');
                result.className = 'result error';
                result.innerHTML = `<h3>请求失败</h3><p>${error.message}</p>`;
            }

        function copyBatchResults(items) {
            let text = '';
            items.forEach((item, i) => {
                const acc = item.account;
                text += `=== ${item.cdk} ===\n`;
                text += `邮箱: ${acc?.email || '-'}\n`;
                text += `Access Token: ${acc?.access_token || '-'}\n`;
                text += `Refresh Token: ${acc?.refresh_token || '-'}\n\n`;
            });
            navigator.clipboard.writeText(text).then(() => alert('已复制全部账号信息'));
        }

        function downloadBatchJson(items, format) {
            const orderIds = items.filter(item => item.order_id).map(item => item.order_id);

            if (format === 'cpa-batch') {
                // CPA格式单文件：调用后端批量下载接口
                fetch('/api/orders/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({order_ids: orderIds})
                }).then(resp => resp.blob()).then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `accounts_batch_${orderIds.length}_${Date.now()}.json`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                }).catch(err => alert('下载失败: ' + err.message));
            } else if (format === 'kiro-batch') {
                // Kiro Account Manager格式单文件
                fetch('/api/orders/download/kiro', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({order_ids: orderIds})
                }).then(resp => resp.blob()).then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `accounts_kiro_batch_${orderIds.length}_${Date.now()}.json`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                }).catch(err => alert('下载失败: ' + err.message));
            } else {
                // 多文件下载：每个账号单独下载
                items.forEach((item, index) => {
                    if (item.order_id) {
                        setTimeout(() => {
                            if (format === 'kiro') {
                                window.open(`/api/order/${item.order_id}/download/kiro`, '_blank');
                            } else {
                                window.open(`/api/order/${item.order_id}/download`, '_blank');
                            }
                        }, index * 200);
                    }
                });
            }
        }

        // 批量质保查询
        async function checkWarrantyBatch() {
            const cdksInput = document.getElementById('warranty-batch-input').value.trim();
            if (!cdksInput) {
                alert('请输入CDK码');
                return;
            }

            const loading = document.getElementById('warranty-loading');
            const result = document.getElementById('warranty-result');
            loading.classList.add('show');
            result.style.display = '';

            try {
                const response = await fetch('/api/warranty/check-batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cdks: cdksInput})
                });
                const data = await response.json();

                loading.classList.remove('show');

                if (data.success) {
                    let html = `
                        <div class="batch-summary">
                            <div class="batch-summary-item">
                                <div class="count">${data.total}</div>
                                <div class="label">总计</div>
                            </div>
                            <div class="batch-summary-item success">
                                <div class="count">${data.results.filter(r => r.success).length}</div>
                                <div class="label">有效</div>
                            </div>
                            <div class="batch-summary-item failed">
                                <div class="count">${data.results.filter(r => !r.success).length}</div>
                                <div class="label">无效</div>
                            </div>
                        </div>
                        <div class="batch-result">
                    `;

                    data.results.forEach(item => {
                        const warrantyClass = item.success && item.warranty?.in_warranty ? 'success' : 'failed';
                        html += `
                            <div class="batch-item ${item.success ? 'success' : 'failed'}">
                                <div class="batch-item-header">
                                    <span class="batch-item-cdk">${item.cdk}</span>
                                    <span class="batch-item-status ${warrantyClass}">${item.success ? (item.warranty?.in_warranty ? '质保中' : '已过期') : '失败'}</span>
                                </div>
                                <div class="batch-item-content">
                                    ${item.success ? `
                                        订单号: ${item.order?.id}<br>
                                        邮箱: ${item.account?.email || '-'}<br>
                                        账号状态: ${item.account?.status === 'blocked' ? '封禁' : (item.account?.status === 'available' ? '正常' : '未知')}<br>
                                        质保到期: ${new Date(item.order?.warranty_expires_at).toLocaleString()}<br>
                                        替换次数: ${item.order?.replacement_count}/${item.warranty?.max_replacements}
                                        ${item.warranty?.can_replace ? '<br><span style="color:#dc3545;font-weight:bold;">可申请替换</span>' : ''}
                                    ` : `<span style="color:#dc3545">${item.error}</span>`}
                                </div>
                            </div>
                        `;
                    });

                    html += '</div>';
                    result.className = 'result success';
                    result.innerHTML = html;
                } else {
                    result.className = 'result error';
                    result.innerHTML = `<h3>批量查询失败</h3><p>${data.error}</p>`;
                }
            } catch (error) {
                loading.classList.remove('show');
                result.className = 'result error';
                result.innerHTML = `<h3>请求失败</h3><p>${error.message}</p>`;
            }
        }

        function copyBatchReplacements(items) {
            let text = '';
            items.forEach((item, i) => {
                const acc = item.new_account;
                text += `=== ${item.cdk} ===\n`;
                text += `邮箱: ${acc?.email || '-'}\n`;
                text += `Access Token: ${acc?.access_token || '-'}\n`;
                text += `Refresh Token: ${acc?.refresh_token || '-'}\n\n`;
            });
            navigator.clipboard.writeText(text).then(() => alert('已复制全部新账号信息'));

        function downloadBatchReplacementJson(items, format) {
            const orderIds = items.map(item => item.order_id);

            if (format === 'cpa-batch') {
                // CPA格式单文件
                fetch('/api/orders/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({order_ids: orderIds})
                }).then(resp => resp.blob()).then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `replacements_batch_${orderIds.length}_${Date.now()}.json`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                }).catch(err => alert('下载失败: ' + err.message));
            } else if (format === 'kiro-batch') {
                // Kiro Account Manager格式单文件
                fetch('/api/orders/download/kiro', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({order_ids: orderIds})
                }).then(resp => resp.blob()).then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `replacements_kiro_batch_${orderIds.length}_${Date.now()}.json`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                }).catch(err => alert('下载失败: ' + err.message));
            } else if (format === 'kiro' || format === 'cpa') {
                // 多文件下载
                items.forEach((item, index) => {
                    if (item.order_id) {
                        setTimeout(() => {
                            if (format === 'kiro') {
                                window.open(`/api/order/${item.order_id}/download/kiro`, '_blank');
                            } else {
                                window.open(`/api/order/${item.order_id}/download`, '_blank');
                            }
                        }, index * 200);
                    }
                });
            } else {
                // 默认格式：原始的替换记录格式
                const data = items.map(item => ({
                    cdk: item.cdk,
                    order_id: item.order_id,
                    replacement_count: item.replacement_count,
                    new_account: item.new_account
                }));
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `batch_replacements_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
